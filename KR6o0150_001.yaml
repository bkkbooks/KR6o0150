body:
  text: 法尊本論為法尊法師最新之翻譯係文革後唯一可見到的佛教文獻法尊法師年已垂老今後是否仍能執筆已不可知中國唯一最高的西藏佛學專家但願其不為中共政治壓力所逼仍能繼續為佛教慧命住世為自由世界多移譯一些有關西藏佛教的寶貴文獻是幸編者志敬禮曼殊室利童子菩薩敬禮三世一切佛及彼正法與衆僧應賢弟子菩提光勸請善顯覺道燈由下中及上應知有三士當書彼等相各各之差別若以何方便唯於生死樂但求自利益知為下士夫背棄三有樂遮止諸惡業但求自寂滅彼名為中士若以自身苦比他一切苦欲求永盡者彼是上士夫為諸勝有情求大菩提者當說諸師長所示正方便對佛畫像等及諸靈塔前以花香等物盡所有供養亦以普賢行所說七支供以至菩提藏不退轉之心信仰三寶尊雙膝著於地恭敬合掌已先三遍皈依次一切有情以慈心為先觀惡趣生等及死歿等苦無餘諸衆生為苦所苦惱從苦及苦因欲度脫衆生立誓永不退當發菩提心如是發願心所生諸功德如華嚴經中彌勒應宣說或讀彼經或師聞了知正等菩提心功德無邊為因緣如是數數發其心勇施請問經亦廣說此福彼略攝三頌今此當摘録菩提心福德假使有色者充滿虛空界其福猶有餘若人以寶珍遍滿恆沙數一切佛世界供獻於諸佛若有人合掌心敬大菩提此供最殊勝其福無邊際既發菩提願心已應多勵力遍增長此為餘生常憶念如說學處當遍護除行心體諸律儀非能增長正願心由欲增長菩提願故當勵力受此律若常具餘七別解脫律儀乃有菩薩律善根餘非有七衆別解脫如來所宣說梵行為最勝是苾芻律儀當以菩薩地戒品所說軌從具德相師受持彼律儀善巧律儀軌自安住律儀堪傳律具悲當知是良師若努力尋求不得如是師當宣說其餘受律儀軌則如昔妙吉祥為虛空王時所發菩提心如妙祥莊嚴佛土經所說如是此當書於諸依怙前發大菩提心請一切衆生度彼出生死損害心忿心慳吝與嫉妒從今至證道此等終不起當修行梵行當斷罪及欲愛樂戒律儀當隨諸佛學不樂為自己速得大菩提為一有情因住到最後際當嚴淨無量不思議佛土受持於名號及住十方界我之身語業一切使清淨意業亦清淨不作不善業自身語心清淨因謂住行心體律儀由善學習三戒學於三戒學起敬重如是勤清淨菩薩諸律儀便當能圓滿大菩提資糧福智為自性資糧圓滿因一切佛共許為引發神通如鳥未生翼不能騰虛空若離神通力不能利有情具通者日夜所修諸福德諸離神通者百生不能集若欲速圓滿大菩提資糧要勤修神通方成非懈怠若未成就止不能起神通為修成止故應數數策勵止支若失壞即使勤修習縱然經千載亦不能得定故當善安住定資糧品中所說諸支分於隨一所緣意安住於善瑜伽若成止神通亦當成離慧度瑜伽不能盡諸障為無餘斷除煩惱所知障故應具方便修慧度瑜伽般若離方便方便離般若俱說為繫縛故二不應離何慧何方便為除諸疑故當明諸方便與般若差別除般若度外施波羅蜜等一切善資糧佛說為方便若修方便力自善修般若彼速證菩提非單修無我遍達蘊處界皆悉無有生了知自性空說名為般若有則生非理無亦如空花俱則犯俱過故俱亦不生諸法不自生亦非他及共亦非無因生故無體自性又一切諸法用一異觀察自性不可得定知無自性七十空性理及本中論等亦成立諸法自性之空性由恐文太繁故此不廣說僅就已成宗為修故而說故無餘諸法自性不可得所有修無我即是修般若以慧觀諸法都不見自性亦了彼慧性無分別修彼三有分別生分別為體性故斷諸分別是最勝涅槃如世尊說云分別大無明能墮生死海住無分別定無分別如空入無分別陀羅尼亦云佛子於此法若思無分別越分別險阻漸得無分別由聖教正理定解一切法無生無自性當修無分別如是修真性漸得暖等已當得極喜等佛菩提非遙由咒力成就靜增等事業及修寶瓶等八大悉地力欲安樂圓滿大菩提資糧若有欲修習事行等續部所說諸密咒為求師長灌頂故當以承事寶等施依教行等一切事使良師長心歡喜由於師長心喜故圓滿傳授師灌頂清淨諸罪為體性是修悉地善根者初佛大續中極力遮止故密與慧灌頂梵行者勿受倘持彼灌頂安住梵行者違犯所遮故失壞彼律儀其持禁行者則犯他勝罪定當墮惡趣亦無所成就若聽講諸續護摩祠祀等得師灌頂者知真實無過燃燈智上座見經法等說由菩提光請略說菩提道菩提道燈大阿遮利耶吉祥燃燈智造論圓滿法尊譯於廣濟寺一九七八年八月八日編者按本論係由阿底峽燃燈吉祥智尊者造法尊法師移譯
